<!-- ================================================================
   components/comment_item.html
   Reusable single comment row.
   Variable: comment — a Comment model instance
   ================================================================ -->
<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">
  <div style="width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid #efefef">
    {% if comment.user.profile and comment.user.profile.profile_image %}
      <img src="{{ comment.user.profile.profile_image.url }}" style="width:100%;height:100%;object-fit:cover" alt="">
    {% else %}
      <div style="width:100%;height:100%;background:linear-gradient(135deg,#a8edea,#fed6e3);display:flex;align-items:center;justify-content:center;font-size:14px">🧑</div>
    {% endif %}
  </div>
  <div style="font-size:13px;line-height:1.45">
    <span style="font-weight:700;margin-right:4px">{{ comment.user.username }}</span>{{ comment.text }}
    <div style="display:flex;gap:12px;margin-top:3px">
      <span style="font-size:11px;color:#8e8e8e">{{ comment.created_at|timesince }} ago</span>
    </div>
  </div>
</div>
